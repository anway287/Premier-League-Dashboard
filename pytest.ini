[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Register the metrics collector plugin
addopts =
    -v
    --tb=short
    --strict-markers
    -p metrics.collector

log_cli = true
log_cli_level = WARNING
log_format = %(levelname)s %(name)s: %(message)s

markers =
    integration: requires LocalStack (HERMETIC_USE_LOCALSTACK=1)
    slow: intentionally slow tests (38-week season processing)
    epl: Premier League data
    nba: NBA data
    e2e: full pipeline end-to-end
